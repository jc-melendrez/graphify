<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphify - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            background: #07080d;
            color: #e4e5ea;
            position: relative; overflow: hidden;
            padding: 24px;
        }

        /* ── Background atmosphere ── */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(#1e2233 1px, transparent 1px),
                linear-gradient(90deg, #1e2233 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 10%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 10%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; z-index: 0;
            width: 500px; height: 400px; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(245,158,11,0.08), transparent 70%);
            filter: blur(80px);
            pointer-events: none;
        }

        /* ── Logo ── */
        .brand {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease both;
        }
        .brand i {
            color: #f59e0b; font-size: 1.35rem;
        }
        .brand span {
            font-weight: 700; font-size: 1.35rem; letter-spacing: -0.03em;
        }

        /* ── Card ── */
        .card {
            position: relative; z-index: 1;
            background: #161a25;
            padding: 36px 32px 32px;
            border-radius: 14px;
            border: 1px solid #242938;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.02) inset;
            width: 100%; max-width: 400px;
            text-align: center;
            animation: fadeUp 0.5s ease 0.08s both;
        }
        .card h2 {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .card-subtitle {
            font-size: 0.88rem; color: #6b7280; margin-bottom: 28px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Messages ── */
        .messages {
            list-style: none; padding: 0;
            margin: 0 0 20px 0;
        }
        .messages li {
            padding: 12px 14px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 500;
            text-align: left;
            animation: fadeUp 0.3s ease both;
        }
        .messages .error,
        .messages .warning {
            color: #fca5a5;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
        }
        .messages .success {
            color: #86efac;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
        }

        /* ── Form ── */
        form {
            display: flex; flex-direction: column;
        }
        .input-group {
            position: relative; margin-bottom: 16px;
        }
        .input-group i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #4b5563; font-size: 0.88rem;
            transition: color 0.2s;
            pointer-events: none;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%; padding: 13px 14px 13px 42px;
            background: #0d0f16;
            border: 1px solid #242938;
            border-radius: 10px;
            color: #e4e5ea;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: #4b5563; }
        input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }
        input:focus + i,
        input:focus ~ i { color: #f59e0b; }
        /* Handle icon placed before input */
        .input-group:has(input:focus) i { color: #f59e0b; }

        .form-btn {
            width: 100%; padding: 13px;
            font-size: 0.92rem; font-family: 'Space Grotesk', system-ui, sans-serif;
            font-weight: 700; cursor: pointer;
            background: #f59e0b; color: #000;
            border: none; border-radius: 10px;
            transition: all 0.25s;
            margin-top: 4px;
        }
        .form-btn:hover {
            background: #d97706;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(245,158,11,0.2);
        }
        .form-btn:active { transform: translateY(0); }

        /* ── Register Link ── */
        .register-link {
            margin-top: 20px; font-size: 0.85rem; color: #6b7280;
        }
        .register-link a {
            color: #f59e0b; text-decoration: none; font-weight: 600;
            transition: color 0.2s;
        }
        .register-link a:hover { color: #fbbf24; }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; text-align: center;
            color: #4b5563; margin: 24px 0; font-size: 0.82rem;
            letter-spacing: 0.05em; text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            border-bottom: 1px solid #1e2233;
        }
        .divider:not(:empty)::before { margin-right: .8em; }
        .divider:not(:empty)::after { margin-left: .8em; }

        /* ── Social Login ── */
        .social-login {
            display: flex; justify-content: center; gap: 14px;
        }
        .social-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 46px; height: 46px; border-radius: 12px;
            background: #0d0f16;
            border: 1px solid #242938;
            background-size: 44%; background-repeat: no-repeat; background-position: center;
            transition: all 0.25s;
            text-decoration: none;
        }
        .social-icon:hover {
            border-color: #2e3448;
            background-color: #181c2a;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        /* GitHub icon override — use FA icon instead of external image for consistency */
        #github-login-icon {
            background-image: none;
        }
        #github-login-icon::after {
            content: '\f09b';
            font-family: 'Font Awesome 6 Brands';
            font-size: 1.15rem;
            color: #e4e5ea;
        }
        /* Google icon override — use FA icon */
        #google-login-icon {
            background-image: none;
        }
        #google-login-icon::after {
            content: '\f1a0';
            font-family: 'Font Awesome 6 Brands';
            font-size: 1.15rem;
            color: #e4e5ea;
        }

        /* ── Result / Status text ── */
        #result {
            margin-top: 16px; font-size: 0.84rem;
            color: #9ca3af; min-height: 1.4em;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Footer note ── */
        .footer-note {
            position: relative; z-index: 1;
            margin-top: 28px; font-size: 0.75rem;
            color: #3b3f50; text-align: center;
            animation: fadeUp 0.5s ease 0.16s both;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 28px 20px 24px; }
            .card h2 { font-size: 1.3rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="brand">
        <i class="fa-solid fa-chart-column"></i>
        <span>Graphify</span>
    </div>

    <div class="card">
        <h2>Welcome back</h2>
        <p class="card-subtitle">Sign in to your account to continue</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="form-btn">Sign In</button>
        </form>

        <div class="register-link">
            <p>Don't have an account? <a href="{% url 'register' %}">Create one</a></p>
        </div>

        <div class="divider">or continue with</div>

        <div class="social-login">
            <a id="google-login-icon" class="social-icon" title="Sign in with Google"></a>
            <a id="github-login-icon" href="{% url 'github_login' %}" class="social-icon" title="Sign in with GitHub"></a>
        </div>

        <div id="result"></div>
    </div>

    <div class="footer-note">Client-side data visualization</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // This safely reads the config injected by your Django view
    const firebaseConfig = JSON.parse('{{ firebase_config|safe }}');

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const googleBtn = document.getElementById('google-login-icon');
    const resultDiv = document.getElementById('result');

    googleBtn.onclick = async () => {
        googleBtn.style.pointerEvents = 'none';
        resultDiv.innerText = "Signing in...";

        try {
            // Using Popup instead of Redirect
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            
            resultDiv.innerText = "Authenticated! Syncing with Django...";
            const idToken = await user.getIdToken();
            
            const response = await fetch('/auth/google/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_token: idToken })
            });

            const data = await response.json();
            if (data.status === "success") {
                window.location.href = '/dashboard/';
            } else {
                resultDiv.innerText = "Django Error: " + data.message;
            }
        } catch (error) {
            console.error("Auth Error (Popup):", error.code, error.message);
            googleBtn.style.pointerEvents = 'auto';
            resultDiv.innerText = "Error: " + error.code;
        }
    };
</script>
</body>
</html>
