<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Account - Graphify</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            background: #07080d;
            color: #e4e5ea;
            position: relative; overflow: hidden;
            padding: 24px;
        }

        /* ── Background atmosphere ── */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(#1e2233 1px, transparent 1px),
                linear-gradient(90deg, #1e2233 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 10%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 10%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; z-index: 0;
            width: 500px; height: 400px; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(245,158,11,0.08), transparent 70%);
            filter: blur(80px);
            pointer-events: none;
        }

        /* ── Logo ── */
        .brand {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease both;
        }
        .brand i { color: #f59e0b; font-size: 1.35rem; }
        .brand span { font-weight: 700; font-size: 1.35rem; letter-spacing: -0.03em; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Card ── */
        .card {
            position: relative; z-index: 1;
            background: #161a25;
            padding: 36px 32px 32px;
            border-radius: 14px;
            border: 1px solid #242938;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.02) inset;
            width: 100%; max-width: 400px;
            text-align: center;
            animation: fadeUp 0.5s ease 0.08s both;
        }
        .card h2 {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .card-subtitle {
            font-size: 0.88rem; color: #6b7280; margin-bottom: 28px;
        }

        /* ── Messages ── */
        .messages {
            list-style: none; padding: 0;
            margin: 0 0 20px 0;
        }
        .messages li {
            padding: 12px 14px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 500;
            text-align: left;
            animation: fadeUp 0.3s ease both;
        }
        .messages .error,
        .messages .warning {
            color: #fca5a5;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
        }
        .messages .success {
            color: #86efac;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
        }

        /* ── Form ── */
        form {
            display: flex; flex-direction: column;
        }
        .input-group {
            position: relative; margin-bottom: 16px;
        }
        input[type="text"] {
            width: 100%; padding: 13px 14px;
            background: #0d0f16;
            border: 1px solid #242938;
            border-radius: 10px;
            color: #e4e5ea;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: #4b5563; }
        input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }

        .form-btn {
            width: 100%; padding: 13px;
            font-size: 0.92rem; font-family: 'Space Grotesk', system-ui, sans-serif;
            font-weight: 700; cursor: pointer;
            background: #f59e0b; color: #000;
            border: none; border-radius: 10px;
            transition: all 0.25s;
            margin-top: 8px;
        }
        .form-btn:hover {
            background: #d97706;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(245,158,11,0.2);
        }
        .form-btn:active { transform: translateY(0); }

        /* ── Info text ── */
        .info-text {
            color: #6b7280; font-size: 0.88rem; margin-top: 16px; line-height: 1.5;
        }
        .info-text strong {
            color: #f59e0b;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 28px 20px 24px; }
            .card h2 { font-size: 1.3rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="brand">
        <i class="fas fa-chart-line"></i>
        <span>Graphify</span>
    </div>

    <div class="card">
        <h2>Verify Your Account</h2>
        <div class="card-subtitle">
            We've sent a 6-digit code to <strong style="color: #f59e0b;">{{ email }}</strong>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="otp" placeholder="_ _ _ _ _ _" maxlength="6" inputmode="numeric" required>
            </div>
            <button type="submit" class="form-btn">Verify Code</button>
        </form>

        <div class="info-text">
            Code expires in <strong>5 minutes</strong>
        </div>
    </div>
</body>
</html>
